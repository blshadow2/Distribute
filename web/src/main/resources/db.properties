# 이 파일은 fallback 용 템플릿이다.
# 실제 접속 정보는 각 기기의 환경 변수로 설정한다:
#   LAWSYSTEM_DB_URL      - 예: jdbc:mariadb://192.168.1.105:3306/law_system?...
#   LAWSYSTEM_DB_USER     - 예: blshadow2
#   LAWSYSTEM_DB_PASSWORD - 예: ********
#   LAWSYSTEM_DB_DATABASE - 예: law_system (선택, 기본값 law_system)
#
# 환경 변수가 있으면 이 파일의 값보다 우선한다.

jdbc.driver=org.mariadb.jdbc.Driver
jdbc.database=law_system
# jdbc.url=
# jdbc.username=
# jdbc.password=
