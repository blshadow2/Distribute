server:
  port: 8080

spring:
  application:
    name: lawSystem-web
  datasource:
    # 기존 Java/Python 과 동일한 시스템 환경변수(LAWSYSTEM_DB_*) 재사용
    url: ${LAWSYSTEM_DB_URL:jdbc:mariadb://localhost:3306/law_system}
    username: ${LAWSYSTEM_DB_USER:root}
    password: ${LAWSYSTEM_DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update          # 엔티티 기준으로 테이블 자동 생성/갱신
    open-in-view: false         # 지연로딩 누수 방지 — 매핑은 트랜잭션 안에서 DTO 로
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

# 증거 파일 업로드 저장 위치
app:
  upload-dir: ./uploads

# Python RAG 서비스 주소 (PrecedentRagClient 가 환경변수 PRECEDENT_RAG_URL 도 인식)
precedent:
  rag:
    url: ${PRECEDENT_RAG_URL:http://localhost:8000}
  # 시작 시 JPA 로 자동 적재할 판례 원문 JSONL (precedent 테이블이 비어 있을 때만)
  data:
    jsonl: '\\192.168.0.17\Code\Python\precedent\data\privacy_cases.jsonl'
