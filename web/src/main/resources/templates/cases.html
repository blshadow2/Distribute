<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>내 사건 · AI 법률 사무 플랫폼</title>
    <link rel="stylesheet" href="/css/cohere.css"/>
</head>
<body>
<nav th:replace="~{fragments/nav :: topnav}"></nav>

<div class="container section">
    <span class="mono-label">MY CASES</span>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;margin:8px 0 20px;">
        <h1 class="display display-md" style="margin:0;">내 사건</h1>
        <a class="btn btn-primary" href="/cases/new">+ 사건 등록</a>
    </div>

    <div class="card" th:if="${#lists.isEmpty(cases)}">
        <p class="muted" style="margin:0;">등록된 사건이 없습니다. <a href="/cases/new">사건 등록</a>으로 시작하세요.</p>
    </div>

    <div class="card" th:unless="${#lists.isEmpty(cases)}" style="padding:0;overflow:hidden;">
        <table class="table">
            <thead>
            <tr><th>제목</th><th>분야</th><th>상태</th><th>등록일</th></tr>
            </thead>
            <tbody>
            <tr th:each="c : ${cases}">
                <td><a th:href="@{/cases/{id}(id=${c.caseId})}" th:text="${c.title}">제목</a></td>
                <td th:text="${c.category}">분야</td>
                <td><span class="badge" th:text="${c.status}">상태</span></td>
                <td th:text="${c.createdAt != null ? #strings.substring(c.createdAt,0,10) : ''}">날짜</td>
            </tr>
            </tbody>
        </table>
    </div>

    <p class="small muted" style="margin-top:16px;">
        등록한 사건은 <a href="/ai-tools">AI 도구</a>에서 선택해 키워드 추출·법리 설명에 바로 사용할 수 있습니다.
    </p>
</div>
</body>
</html>
