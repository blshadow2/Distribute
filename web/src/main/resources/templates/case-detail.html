<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${aCase != null ? aCase.title : '사건 상세'}">사건 상세</title>
    <link rel="stylesheet" href="/css/cohere.css"/>
</head>
<body>
<nav th:replace="~{fragments/nav :: topnav}"></nav>

<div class="container section" th:if="${aCase != null}">
    <a href="/cases" class="small">← 내 사건 목록</a>

    <!-- 사건 정보 -->
    <span class="mono-label" style="display:block;margin-top:12px;">CASE</span>
    <h1 class="display display-md" style="margin:8px 0 4px;" th:text="${aCase.title}">제목</h1>
    <p class="muted small">
        <span class="badge" th:text="${aCase.category}">분야</span>
        <span class="badge" th:text="${aCase.status}">상태</span>
        <span th:text="${aCase.currentStage}">단계</span>
    </p>

    <div class="card" style="margin-top:14px;">
        <div class="mono-label" style="margin-bottom:8px;">사실관계</div>
        <pre style="white-space:pre-wrap;word-break:break-word;margin:0;font-family:var(--font-body);"
             th:text="${aCase.factDescription}">사실관계</pre>
    </div>

    <div style="margin-top:16px;">
        <a class="btn btn-primary" href="/ai-tools">AI 도구로 분석</a>
    </div>

    <!-- 사건 키워드 (AI 키워드 추출 결과) -->
    <div style="margin-top:20px;" th:if="${aCase.keywords != null and !#lists.isEmpty(aCase.keywords)}">
        <div class="mono-label" style="margin-bottom:6px;">사건 키워드</div>
        <span class="tag" th:each="k : ${aCase.keywords}" th:text="${k}">키워드</span>
        <div style="margin-top:10px;">
            <a class="btn btn-pill-outline"
               th:href="@{/lawyers(keyword=${#strings.listJoin(aCase.keywords, ' ')})}">
                이 키워드로 변호사 찾기 →
            </a>
        </div>
    </div>
    <p class="small muted" style="margin-top:14px;"
       th:if="${aCase.keywords == null or #lists.isEmpty(aCase.keywords)}">
        AI 도구에서 이 사건을 선택해 <b>키워드 추출</b>을 실행하면, 키워드가 여기 저장되고 그 키워드로 변호사를 찾을 수 있습니다.
    </p>

    <!-- 증거자료 -->
    <h2 class="card-title" style="margin-top:36px;">증거자료</h2>
    <form class="card" method="post"
          th:action="@{/cases/{id}/evidence(id=${aCase.caseId})}"
          enctype="multipart/form-data"
          style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;">
        <div style="flex:1;min-width:200px;">
            <label class="field">파일</label>
            <input type="file" name="file" required/>
        </div>
        <div style="flex:2;min-width:200px;">
            <label class="field">설명 (선택)</label>
            <input type="text" name="description" placeholder="증거 설명"/>
        </div>
        <button type="submit" class="btn btn-primary">업로드</button>
    </form>

    <div class="card" th:if="${#lists.isEmpty(evidences)}" style="margin-top:12px;">
        <p class="muted" style="margin:0;">등록된 증거자료가 없습니다.</p>
    </div>
    <div class="card" th:unless="${#lists.isEmpty(evidences)}" style="margin-top:12px;padding:0;overflow:hidden;">
        <table class="table">
            <thead><tr><th>파일명</th><th>형식</th><th>설명</th></tr></thead>
            <tbody>
            <tr th:each="e : ${evidences}">
                <td th:text="${e.fileName}">파일</td>
                <td th:text="${e.fileType}">형식</td>
                <td th:text="${e.description}">설명</td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- AI 분석 결과 이력 -->
    <h2 class="card-title" style="margin-top:36px;">AI 분석 결과 이력</h2>
    <div class="card" th:if="${#lists.isEmpty(aiResults)}">
        <p class="muted" style="margin:0;">이 사건으로 실행된 AI 분석 결과가 없습니다. AI 도구에서 사건을 선택해 실행하세요.</p>
    </div>
    <div th:each="r : ${aiResults}" class="card" style="margin-bottom:12px;">
        <div class="mono-label" style="margin-bottom:6px;">
            <span th:text="${r.resultType}">TYPE</span> ·
            <span th:text="${r.generatedAt != null ? #strings.substring(r.generatedAt,0,19) : ''}">시각</span>
        </div>
        <pre style="white-space:pre-wrap;word-break:break-word;margin:0;font-family:var(--font-body);font-size:14px;"
             th:text="${r.summaryText}">결과</pre>
    </div>
</div>

<div class="container section" th:if="${aCase == null}">
    <p class="muted">사건을 찾을 수 없습니다. <a href="/cases">목록으로</a></p>
</div>
</body>
</html>
