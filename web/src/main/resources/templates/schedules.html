<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>상담 일정 관리 · AI 법률 사무 플랫폼</title>
    <link rel="stylesheet" href="/css/cohere.css"/>
</head>
<body>
<nav th:replace="~{fragments/nav :: topnav}"></nav>

<div class="container section">
    <span class="mono-label">STAFF · SCHEDULE</span>
    <h1 class="display display-md" style="margin:8px 0 20px;">상담 일정 관리</h1>

    <!-- 일정 등록 -->
    <form class="card" method="post" action="/schedules"
          style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;">
        <div style="flex:1;min-width:160px;">
            <label class="field">변호사</label>
            <select name="lawyerId" required>
                <option th:each="l : ${lawyers}" th:value="${l.lawyerId}" th:text="${l.name}">변호사</option>
            </select>
        </div>
        <div>
            <label class="field">일시</label>
            <input type="datetime-local" name="dateTime" required/>
        </div>
        <div>
            <label class="field">시간(분)</label>
            <input type="number" name="duration" value="30" min="10" max="180" style="width:90px;"/>
        </div>
        <button type="submit" class="btn btn-primary">일정 등록</button>
    </form>

    <!-- 전체 일정 -->
    <h2 class="card-title" style="margin-top:32px;">등록된 일정</h2>
    <div class="card" th:if="${#lists.isEmpty(schedules)}"><p class="muted" style="margin:0;">등록된 일정이 없습니다.</p></div>
    <div class="card" th:unless="${#lists.isEmpty(schedules)}" style="padding:0;overflow:hidden;">
        <table class="table">
            <thead><tr><th>변호사</th><th>일시</th><th>시간</th><th>상태</th></tr></thead>
            <tbody>
            <tr th:each="s : ${schedules}">
                <td th:text="${s.lawyerName}">변호사</td>
                <td th:text="${s.dateTime}">일시</td>
                <td th:text="${s.duration + '분'}">시간</td>
                <td><span class="badge" th:text="${s.status}">상태</span></td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- 상담 신청 관리 -->
    <h2 class="card-title" style="margin-top:36px;">상담 신청 관리</h2>
    <div class="card" th:if="${#lists.isEmpty(requests)}"><p class="muted" style="margin:0;">상담 신청이 없습니다.</p></div>
    <div class="card" th:unless="${#lists.isEmpty(requests)}" style="padding:0;overflow:hidden;">
        <table class="table">
            <thead><tr><th>의뢰인</th><th>변호사</th><th>일정</th><th>상태</th><th>처리</th></tr></thead>
            <tbody>
            <tr th:each="r : ${requests}">
                <td th:text="${r.clientName}">의뢰인</td>
                <td th:text="${r.lawyerName}">변호사</td>
                <td th:text="${r.scheduleTime}">일정</td>
                <td><span class="badge" th:text="${r.status}">상태</span></td>
                <td>
                    <form th:action="@{/consultations/{id}/approve(id=${r.id})}" method="post" style="display:inline;">
                        <button class="btn btn-pill-outline" type="submit">승인</button>
                    </form>
                    <form th:action="@{/consultations/{id}/reject(id=${r.id})}" method="post" style="display:inline;">
                        <button class="btn btn-pill-outline" type="submit">거절</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
