<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>진행상황 공유 · AI 법률 사무 플랫폼</title>
    <link rel="stylesheet" href="/css/cohere.css"/>
</head>
<body>
<nav th:replace="~{fragments/nav :: topnav}"></nav>

<div class="container section">
    <span class="mono-label">PROGRESS · SHARE</span>
    <h1 class="display display-md" style="margin:8px 0 20px;">진행상황 공유</h1>

    <form class="card" method="post" action="/progress-share" style="display:flex;flex-direction:column;gap:12px;">
        <div>
            <label class="field">담당 사건</label>
            <select name="caseId" required>
                <option th:each="c : ${cases}" th:value="${c.caseId}" th:text="${c.title}">사건</option>
            </select>
        </div>
        <div>
            <label class="field">진행 상태</label>
            <input type="text" name="progressStatus" placeholder="예) 소장 접수 / 증거 준비 / 변론기일 지정"/>
        </div>
        <div>
            <label class="field">진행 설명</label>
            <textarea name="description" rows="3" placeholder="진행 상황 설명"></textarea>
        </div>
        <div>
            <label class="field">최근 수행 조치</label>
            <input type="text" name="recentAction" placeholder="예) 답변서 제출"/>
        </div>
        <div>
            <label class="field">요청 자료 (선택)</label>
            <input type="text" name="requestedMaterial" placeholder="의뢰인에게 요청할 자료"/>
        </div>
        <div><button type="submit" class="btn btn-primary">진행상황 등록</button></div>
    </form>

    <h2 class="card-title" style="margin-top:36px;">최근 등록한 진행상황</h2>
    <div class="card" th:if="${#lists.isEmpty(records)}"><p class="muted" style="margin:0;">등록된 진행상황이 없습니다.</p></div>
    <div th:each="r : ${records}" class="card" style="margin-bottom:12px;">
        <div style="display:flex;align-items:center;gap:8px;">
            <span class="card-title" style="margin:0;" th:text="${r.caseTitle}">사건</span>
            <span class="badge" th:text="${r.progressStatus}">상태</span>
        </div>
        <p class="small" style="margin:8px 0 0;" th:text="${r.description}">설명</p>
        <p class="small muted" style="margin:4px 0 0;" th:if="${r.recentAction}">최근 조치: <span th:text="${r.recentAction}"></span></p>
        <p class="small muted" style="margin:4px 0 0;" th:if="${r.requestedMaterial}">요청 자료: <span th:text="${r.requestedMaterial}"></span></p>
    </div>
</div>
</body>
</html>
